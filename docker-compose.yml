version: '3.8'

services:
    php:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: php-fpm
        volumes:
            - .:/var/www/html
        networks:
            - app-network
        depends_on:
            - postgres

    nginx:
        image: nginx:latest
        container_name: nginx
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf  # Убедитесь, что это правильный путь
            - .:/var/www/html
        ports:
            - "8000:80"
        networks:
            - app-network
        depends_on:
            - php

    postgres:
        image: postgres:13
        container_name: postgres
        environment:
            POSTGRES_DB: laravel_docker
            POSTGRES_USER: user
            POSTGRES_PASSWORD: user
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - app-network

networks:
    app-network:
        driver: bridge

volumes:
    postgres_data:
